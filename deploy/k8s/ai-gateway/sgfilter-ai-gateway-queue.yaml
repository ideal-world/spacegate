# ai-gateway-queue Wasm 插件（SgFilter 含完整 clusters 映射，推荐 K8s 用法）
apiVersion: spacegate.idealworld.group/v1
kind: SgFilter
metadata:
  name: ai-gateway-queue
  labels:
    app.kubernetes.io/name: ai-gateway-queue
    app.kubernetes.io/part-of: ai-gateway
spec:
  targetRefs:
    - kind: httproute
      name: ai-api
      namespace: spacegate
  filters:
    - code: wasm
      name: ai-gateway-queue
      enable: true
      config:
        # Harbor OCI 制品（本地 push 脚本见 open-source/harbor/push-ai-gateway-queue.sh）
        url: oci+http://host.docker.internal:9081/ai-gateway/ai-gateway-queue:v1.0.0
        sha256: sha256:8e2b1d3271b7e7c44b01e96e1844e0a231896fbe21b23ba07a01f71a58b9e697
        oci_auth:
          registry: host.docker.internal:9081
          username: admin
          password: Harbor12345
        fail_strategy: fail_close
        validate_on_create: false
        plugin_name: ai-gateway-queue
        plugin_root_id: ai-gateway-queue-root
        plugin_vm_id: ai-gateway-queue-vm
        vm_pool_size: 4
        wait_vm_pool_size: 4
        limits:
          max_memory_pages: 64
          fuel_per_call: 20000000
          epoch_timeout_millis: 50
          max_body_bytes: 33554432
          max_pending_calls: 1
        plugin_config:
          service_cluster: ai-gateway-service
          service_authority: ai-gateway-service
          rate_limit_path: /v1/ratelimit/check
          enqueue_path: /v1/queue/enqueue
          wait_path: /v1/queue/enqueue-and-wait
          service_timeout_ms: 65000
          require_policy: true
        clusters:
          ai-gateway-service: http://ai-gateway-service:18080
