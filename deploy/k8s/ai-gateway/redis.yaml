# Redis 7+（队列 / 限流 / 结果存储）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway-redis
  labels:
    app.kubernetes.io/name: ai-gateway-redis
    app.kubernetes.io/part-of: ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-gateway-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway-redis
  labels:
    app.kubernetes.io/name: ai-gateway-redis
spec:
  selector:
    app.kubernetes.io/name: ai-gateway-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
