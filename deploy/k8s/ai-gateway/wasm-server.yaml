# 集群内 HTTP 分发 Wasm 二进制（SpaceGate 通过 http:// 拉取，无需改 DaemonSet 挂载）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway-wasm
  labels:
    app.kubernetes.io/name: ai-gateway-wasm
    app.kubernetes.io/part-of: ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway-wasm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-gateway-wasm
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: wasm
              mountPath: /usr/share/nginx/html
              readOnly: true
          readinessProbe:
            httpGet:
              path: /spacegate_plugin_ai_gateway_queue.wasm
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
      volumes:
        - name: wasm
          configMap:
            name: ai-gateway-queue-wasm
            defaultMode: 0444
---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway-wasm
  labels:
    app.kubernetes.io/name: ai-gateway-wasm
spec:
  selector:
    app.kubernetes.io/name: ai-gateway-wasm
  ports:
    - name: http
      port: 80
      targetPort: http
