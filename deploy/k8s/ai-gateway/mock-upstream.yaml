# 模拟上游 LLM（生产环境替换为真实模型 Service）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-gateway-mock-upstream
  labels:
    app.kubernetes.io/name: ai-gateway-mock-upstream
    app.kubernetes.io/part-of: ai-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway-mock-upstream
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-gateway-mock-upstream
    spec:
      containers:
        - name: echo
          image: hashicorp/http-echo:1.0.0
          args:
            - -text={"choices":[{"message":{"content":"ok"}}]}
            - -listen=:9000
          ports:
            - containerPort: 9000
              name: http
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway-mock-upstream
  labels:
    app.kubernetes.io/name: ai-gateway-mock-upstream
spec:
  selector:
    app.kubernetes.io/name: ai-gateway-mock-upstream
  ports:
    - name: http
      port: 9000
      targetPort: http
