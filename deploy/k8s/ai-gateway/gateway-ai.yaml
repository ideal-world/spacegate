# AI 流量入口 Gateway（需已安装 GatewayClass: spacegate）
apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/part-of: ai-gateway
spec:
  gatewayClassName: spacegate
  listeners:
    - name: http
      port: 9993
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
