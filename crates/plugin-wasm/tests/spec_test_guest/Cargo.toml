[package]
name = "spec_test_guest"
version = "0.0.0"
edition = "2021"
publish = false
description = "Proxy-Wasm guest used by spacegate-plugin-wasm integration tests. Mirrors proxy-wasm-rust-sdk examples and exercises every host fn our host registers."

# 独立 workspace：本 crate 目标 `wasm32-wasip1`，不参与外层 host workspace。
[workspace]

[lib]
crate-type = ["cdylib"]

[dependencies]
proxy-wasm = "0.2"
log = "0.4"

[profile.release]
codegen-units = 1
opt-level = "z"
lto = "fat"
strip = true
panic = "abort"
