name: LeakChecker

on: [push, pull_request_target]

jobs:
  hello_world_job:
    runs-on: ubuntu-latest
    name: Scan Keywords
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Scan Keywords
        env:
          LEAK_WORDS: ${{secrets.LEAK_WORDS}}
        run: node .github/scan-leak-keywords.mjs
