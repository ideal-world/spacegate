apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: wasmplugins.extensions.higress.io
spec:
  group: extensions.higress.io
  scope: Namespaced
  names:
    plural: wasmplugins
    singular: wasmplugin
    kind: WasmPlugin
    listKind: WasmPluginList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                pluginName:
                  type: string
                sha256:
                  type: string
                phase:
                  type: string
                priority:
                  type: integer
                  format: int32
                imagePullPolicy:
                  type: string
                imagePullSecret:
                  type: string
                defaultConfigDisable:
                  type: boolean
                failStrategy:
                  type: string
                defaultConfig:
                  x-kubernetes-preserve-unknown-fields: true
                matchRules:
                  type: array
                  items:
                    type: object
                    properties:
                      ingress:
                        type: array
                        items:
                          type: string
                      domain:
                        type: array
                        items:
                          type: string
                      service:
                        type: array
                        items:
                          type: string
                      configDisable:
                        type: boolean
                      config:
                        x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                digest:
                  type: string
                message:
                  type: string
