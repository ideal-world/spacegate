apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mcproutes.spacegate.idealworld.group
spec:
  group: spacegate.idealworld.group
  names:
    categories: []
    kind: MCPRoute
    plural: mcproutes
    shortNames: []
    singular: mcproute
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for McpRouteSpec via `CustomResource`
        properties:
          spec:
            description: CommonRouteSpec defines the common attributes that all Routes MUST include within their spec.
            properties:
              backend_refs:
                default: []
                items:
                  description: |-
                    BackendObjectReference defines how an ObjectReference that is specific to BackendRef. It includes a few additional fields and features than a regular ObjectReference.

                    Note that when a namespace is specified, a ReferencePolicy object is required in the referent namespace to allow that namespace's owner to accept the reference. See the ReferencePolicy documentation for details.

                    The API object must be valid in the cluster; the Group and Kind must be registered in the cluster for this reference to be valid.

                    References to objects with invalid Group and Kind are not valid, and must be rejected by the implementation, with appropriate Conditions set on the containing object.
                  properties:
                    downgradeHttp2:
                      description: whether to downgrade http2 to http1.1
                      nullable: true
                      type: boolean
                    filters:
                      description: HTTPRoute-compatible backend filters are validated by the runtime model.
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      nullable: true
                      type: array
                    group:
                      description: Group is the group of the referent. For example, "networking.k8s.io". When unspecified (empty string), core API group is inferred.
                      nullable: true
                      type: string
                    kind:
                      description: Kind is kind of the referent. For example "HTTPRoute" or "Service". Defaults to "Service" when not specified.
                      nullable: true
                      type: string
                    name:
                      description: Name is the name of the referent.
                      type: string
                    namespace:
                      description: |-
                        Namespace is the namespace of the backend. When unspecified, the local namespace is inferred.

                        Note that when a namespace is specified, a ReferencePolicy object is required in the referent namespace to allow that namespace's owner to accept the reference. See the ReferencePolicy documentation for details.

                        Support: Core
                      nullable: true
                      type: string
                    port:
                      description: Port specifies the destination port number to use for this resource. Port is required when the referent is a Kubernetes Service. For other resources, destination port might be derived from the referent resource or this field.
                      format: uint16
                      minimum: 0.0
                      nullable: true
                      type: integer
                    timeoutMode:
                      enum:
                      - request
                      - disabled
                      nullable: true
                      type: string
                    timeoutMs:
                      format: uint32
                      minimum: 0.0
                      nullable: true
                      type: integer
                    weight:
                      description: |-
                        Weight specifies the proportion of requests forwarded to the referenced backend. This is computed as weight/(sum of weights from all BackendRefs). For non-zero values, there may be some epsilon from the exact proportion defined here depending on the precision an implementation supports. Weight is not a percentage and the sum of weights does not need to equal 100.

                        If only one backend is specified and it has a weight greater than 0, 100% of the traffic should be forwarded to that backend. If weight is set to 0, no traffic should be forwarded for this entry. If unspecified, weight defaults to 1.

                        Support for this field varies based on the context where used.
                      format: uint16
                      minimum: 0.0
                      nullable: true
                      type: integer
                  type: object
                type: array
              hostnames:
                items:
                  type: string
                nullable: true
                type: array
              legacy_sse:
                nullable: true
                properties:
                  message_path:
                    type: string
                  sse_path:
                    type: string
                required:
                - message_path
                - sse_path
                type: object
              parentRefs:
                description: |-
                  ParentRefs references the resources (usually Gateways) that a Route wants to be attached to. Note that the referenced parent resource needs to allow this for the attachment to be complete. For Gateways, that means the Gateway needs to allow attachment from Routes of this kind and namespace.

                  The only kind of parent resource with "Core" support is Gateway. This API may be extended in the future to support additional kinds of parent resources such as one of the route kinds.

                  It is invalid to reference an identical parent more than once. It is valid to reference multiple distinct sections within the same parent resource, such as 2 Listeners within a Gateway.

                  It is possible to separately reference multiple distinct objects that may be collapsed by an implementation. For example, some implementations may choose to merge compatible Gateway Listeners together. If that is the case, the list of routes attached to those resources should also be merged.
                items:
                  description: |-
                    ParentReference identifies an API object (usually a Gateway) that can be considered a parent of this resource (usually a route). The only kind of parent resource with "Core" support is Gateway. This API may be extended in the future to support additional kinds of parent resources, such as HTTPRoute.

                    The API object must be valid in the cluster; the Group and Kind must be registered in the cluster for this reference to be valid.
                  properties:
                    group:
                      description: |-
                        Group is the group of the referent.

                        Support: Core
                      nullable: true
                      type: string
                    kind:
                      description: |-
                        Kind is kind of the referent.

                        Support: Core (Gateway) Support: Custom (Other Resources)
                      nullable: true
                      type: string
                    name:
                      description: |-
                        Name is the name of the referent.

                        Support: Core
                      type: string
                    namespace:
                      description: |-
                        Namespace is the namespace of the referent. When unspecified (or empty string), this refers to the local namespace of the Route.

                        Support: Core
                      nullable: true
                      type: string
                    port:
                      description: |-
                        Port is the network port this Route targets. It can be interpreted differently based on the type of parent resource:

                        * Gateway: All listeners listening on the specified port that also support this kind of Route(and select this Route). It's not recommended to set `Port` unless the networking behaviors specified in a Route must apply to a specific port as opposed to a listener(s) whose port(s) may be changed. When both Port and SectionName are specified, the name and port of the selected listener must match both specified values.

                        Implementations MAY choose to support other parent resources. Implementations supporting other types of parent resources MUST clearly document how/if Port is interpreted.

                        For the purpose of status, an attachment is considered successful as long as the parent resource accepts it partially. For example, Gateway listeners can restrict which Routes can attach to them by Route kind, namespace, or hostname. If 1 of 2 Gateway listeners accept attachment from the referencing Route, the Route MUST be considered successfully attached. If no Gateway listeners accept attachment from this Route, the Route MUST be considered detached from the Gateway.

                        Support: Extended
                      format: uint16
                      minimum: 0.0
                      nullable: true
                      type: integer
                    sectionName:
                      description: |-
                        SectionName is the name of a section within the target resource. In the following resources, SectionName is interpreted as the following:

                        * Gateway: Listener Name. When both Port (experimental) and SectionName are specified, the name and port of the selected listener must match both specified values.

                        Implementations MAY choose to support attaching Routes to other parent resources. If that is the case, they MUST clearly document how/if SectionName is interpreted.

                        When unspecified (empty string), this will reference the entire resource. For the purpose of status, an attachment is considered successful if at least one section in the parent resource accepts it. For example, Gateway listeners can restrict which Routes can attach to them by Route kind, namespace, or hostname. If 1 of 2 Gateway listeners accept attachment from the referencing Route, the Route MUST be considered successfully attached. If no Gateway listeners accept attachment from this Route, the Route MUST be considered detached from the Gateway.

                        Support: Core
                      nullable: true
                      type: string
                  required:
                  - name
                  type: object
                nullable: true
                type: array
              path:
                type: string
              session_affinity:
                default: mcp_session
                enum:
                - mcp_session
                - none
                type: string
              timeout_mode:
                default: disabled
                enum:
                - request
                - disabled
                type: string
              transport:
                default: streamable_http
                enum:
                - streamable_http
                - legacy_sse
                type: string
            required:
            - path
            type: object
          status:
            description: RouteStatus defines the common attributes that all Routes MUST include within their status.
            nullable: true
            properties:
              parents:
                description: |-
                  Parents is a list of parent resources (usually Gateways) that are associated with the route, and the status of the route with respect to each parent. When this route attaches to a parent, the controller that manages the parent must add an entry to this list when the controller first sees the route and should update the entry as appropriate when the route or gateway is modified.

                  Note that parent references that cannot be resolved by an implementation of this API will not be added to this list. Implementations of this API can only populate Route status for the Gateways/parent resources they are responsible for.

                  A maximum of 32 Gateways will be represented in this list. An empty list means the route has not been attached to any Gateway.
                items:
                  description: RouteParentStatus describes the status of a route with respect to an associated Parent.
                  properties:
                    conditions:
                      description: |-
                        Conditions describes the status of the route with respect to the Gateway. Note that the route's availability is also subject to the Gateway's own status conditions and listener status.

                        If the Route's ParentRef specifies an existing Gateway that supports Routes of this kind AND the Gateway's controller has sufficient access, then that Gateway controller MUST set the "Accepted" condition on the Route, to indicate whether the route has been accepted or rejected by the Gateway, and why.

                        A Route MUST be considered "Accepted" if at least one of the Route's rules is implemented by the Gateway.

                        There are a number of cases where the "Accepted" condition may not be set due to lack of controller visibility, including when:

                        * The Route refers to a non-existent parent. * The Route is of a type that the controller does not support. * The Route is in a namespace the controller does not have access to.
                      items:
                        description: Condition contains details for one aspect of the current state of this API Resource.
                        properties:
                          lastTransitionTime:
                            description: lastTransitionTime is the last time the condition transitioned from one status to another. This should be when the underlying condition changed. If that is not known, then using the time when the API field changed is acceptable.
                            format: date-time
                            type: string
                          message:
                            description: message is a human readable message indicating details about the transition. This may be an empty string.
                            type: string
                          observedGeneration:
                            description: observedGeneration represents the .metadata.generation that the condition was set based upon. For instance, if .metadata.generation is currently 12, but .status.conditions[x].observedGeneration is 9, the condition is out of date with respect to the current state of the instance.
                            format: int64
                            type: integer
                          reason:
                            description: reason contains a programmatic identifier indicating the reason for the condition's last transition. Producers of specific condition types may define expected values and meanings for this field, and whether the values are considered a guaranteed API. The value should be a CamelCase string. This field may not be empty.
                            type: string
                          status:
                            description: status of the condition, one of True, False, Unknown.
                            type: string
                          type:
                            description: type of condition in CamelCase or in foo.example.com/CamelCase.
                            type: string
                        required:
                        - lastTransitionTime
                        - message
                        - reason
                        - status
                        - type
                        type: object
                      type: array
                    controllerName:
                      description: |-
                        ControllerName is a domain/path string that indicates the name of the controller that wrote this status. This corresponds with the controllerName field on GatewayClass.

                        Example: "example.net/gateway-controller".

                        The format of this field is DOMAIN "/" PATH, where DOMAIN and PATH are valid Kubernetes names.
                      type: string
                    parentRef:
                      description: ParentRef corresponds with a ParentRef in the spec that this RouteParentStatus struct describes the status of.
                      properties:
                        group:
                          description: |-
                            Group is the group of the referent.

                            Support: Core
                          nullable: true
                          type: string
                        kind:
                          description: |-
                            Kind is kind of the referent.

                            Support: Core (Gateway) Support: Custom (Other Resources)
                          nullable: true
                          type: string
                        name:
                          description: |-
                            Name is the name of the referent.

                            Support: Core
                          type: string
                        namespace:
                          description: |-
                            Namespace is the namespace of the referent. When unspecified (or empty string), this refers to the local namespace of the Route.

                            Support: Core
                          nullable: true
                          type: string
                        port:
                          description: |-
                            Port is the network port this Route targets. It can be interpreted differently based on the type of parent resource:

                            * Gateway: All listeners listening on the specified port that also support this kind of Route(and select this Route). It's not recommended to set `Port` unless the networking behaviors specified in a Route must apply to a specific port as opposed to a listener(s) whose port(s) may be changed. When both Port and SectionName are specified, the name and port of the selected listener must match both specified values.

                            Implementations MAY choose to support other parent resources. Implementations supporting other types of parent resources MUST clearly document how/if Port is interpreted.

                            For the purpose of status, an attachment is considered successful as long as the parent resource accepts it partially. For example, Gateway listeners can restrict which Routes can attach from each Route kind, namespace, or hostname. If 1 of 2 Gateway listeners accepts attachment from the referencing Route, the Route MUST be considered successfully attached. If no Gateway listeners accept attachment from this Route, the Route MUST be considered detached from the Gateway.

                            Support: Extended
                          format: uint16
                          minimum: 0.0
                          nullable: true
                          type: integer
                        sectionName:
                          description: |-
                            SectionName is the name of a section within the target resource. In the following resources, SectionName is interpreted as the following:

                            * Gateway: Listener Name. When both Port (experimental) and SectionName are specified, the name and port of the selected listener must match both specified values.

                            Implementations MAY choose to support attaching Routes to other parent resources. If that is the case, they MUST clearly document how/if SectionName is interpreted.

                            When unspecified (empty string), this will reference the entire resource. For the purpose of status, an attachment is considered successful if at least one section in the parent resource accepts it. For example, Gateway listeners can restrict which Routes can attach from each Route kind, namespace, or hostname. If 1 of 2 Gateway listeners accepts attachment from the referencing Route, the Route MUST be considered successfully attached. If no Gateway listeners accept attachment from this Route, the Route MUST be considered detached from the Gateway.

                            Support: Core
                          nullable: true
                          type: string
                      required:
                      - name
                      type: object
                  required:
                  - conditions
                  - controllerName
                  - parentRef
                  type: object
                type: array
            required:
            - parents
            type: object
        required:
        - spec
        title: McpRoute
        type: object
    served: true
    storage: true
    subresources:
      status: {}
