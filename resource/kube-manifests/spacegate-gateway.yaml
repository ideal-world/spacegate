apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sgfilters.spacegate.idealworld.group
spec:
  group: spacegate.idealworld.group
  scope: Namespaced
  names:
    plural: sgfilters
    singular: sgfilter
    kind: SgFilter
    shortNames:
      - sgf
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - filters
                - targetRefs
              properties:
                filters:
                  type: array
                  items:
                    type: object
                    properties:
                      code:
                        type: string
                        minLength: 1
                      name:
                        type: string
                        minLength: 1
                      enable:
                        type: boolean
                        default: true
                      config:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    required:
                      - code
                      - config
                targetRefs:
                  type: array
                  items:
                    type: object
                    properties:
                      kind:
                        type: string
                        minLength: 1
                      name:
                        type: string
                        minLength: 1
                      namespace:
                        type: string
                        minLength: 1
                    required:
                      - kind
                      - name
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spacegate
  namespace: spacegate
---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: spacegate
  namespace: spacegate
rules:
  - apiGroups:
      - ""
    resources:
      - services
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - discovery.k8s.io
    resources:
      - endpointslices
    verbs:
      - list
      - watch
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      # - gatewayclasses
      - gateways
      - httproutes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - httproutes/status
      - gateways/status
      # - gatewayclasses/status
    verbs:
      - get
      - update
  - apiGroups:
      - spacegate.idealworld.group
    resources:
      - sgfilters
      - httpspaceroutes
      - mcproutes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions.higress.io
    resources:
      - wasmplugins
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions.higress.io
    resources:
      - wasmplugins/status
    verbs:
      - get
      - update
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: spacegate
  namespace: spacegate
subjects:
  - kind: ServiceAccount
    name: spacegate
    namespace: spacegate
roleRef:
  kind: Role
  name: spacegate
  apiGroup: rbac.authorization.k8s.io
---
# GatewayClass is cluster-scoped, so status reconciliation needs ClusterRole permissions.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spacegate-gatewayclass-status
rules:
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gatewayclasses
      - gatewayclasses/status
    verbs:
      - get
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spacegate-gatewayclass-status
subjects:
  - kind: ServiceAccount
    name: spacegate
    namespace: spacegate
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: spacegate-gatewayclass-status
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: spacegate
  namespace: spacegate
spec:
  selector:
    matchLabels:
      app: spacegate
  template:
    metadata:
      labels:
        app: spacegate
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: spacegate
      containers:
        - name: spacegate
          # Replace with an immutable registry tag or digest before applying in production.
          image: registry.example.com/spacegate/spacegate:REPLACE_ME
          imagePullPolicy: IfNotPresent
          volumeMounts:
            # Keep externally supplied dylibs separate from image-bundled plugins.
            - name: external-plugins
              mountPath: /var/lib/spacegate/plugins
            # Wasm modules referenced by file:///plugins/<name>.wasm.
            - name: wasm-plugins
              mountPath: /plugins
              readOnly: true
          env:
            - name: CONFIG
              value: k8s:spacegate
            # Must match the GatewayClass selected by the corresponding Admin deployment.
            - name: GATEWAY_CLASS_NAME
              value: spacegate
            # Native dylib plugin directories scanned at process startup.
            # Keep image-bundled plugins separate from K8s-mounted plugins to avoid volume shadowing.
            - name: PLUGINS
              value: /lib/spacegate/plugins,/var/lib/spacegate/plugins
            # Controls stdout logs and the events/spans visible to OTLP layers.
            - name: RUST_LOG
              value: info
            # OTLP is disabled by default; production overlays should replace the endpoint and enable required signals.
            - name: SPACEGATE_OTEL_ENABLED
              value: "false"
            - name: SPACEGATE_OTEL_SERVICE_NAME
              value: spacegate
            - name: SPACEGATE_OTEL_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            - name: SPACEGATE_OTEL_PROTOCOL
              value: grpc
            - name: SPACEGATE_OTEL_TRACES_ENABLED
              value: "false"
            - name: SPACEGATE_OTEL_TRACES_SAMPLE_RATIO
              value: "1.0"
            - name: SPACEGATE_OTEL_METRICS_ENABLED
              value: "false"
            - name: SPACEGATE_OTEL_METRICS_EXPORT_INTERVAL_MS
              value: "60000"
            - name: SPACEGATE_OTEL_LOGS_ENABLED
              value: "false"
            - name: SPACEGATE_OTEL_LOGS_LEVEL
              value: info
      volumes:
        # Creates the configured external plugin directory even when no dylib is mounted.
        - name: external-plugins
          emptyDir: {}
        # Every node running SpaceGate must contain the same approved Wasm modules here.
        - name: wasm-plugins
          hostPath:
            path: /opt/spacegate/wasm
            type: DirectoryOrCreate
